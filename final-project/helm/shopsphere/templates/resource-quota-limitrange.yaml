apiVersion: v1
kind: ResourceQuota
metadata:
  name: shopsphere-quota
  namespace: {{ .Values.namespace }}
spec:
  hard:
    pods: "30"
    requests.cpu: "4"
    requests.memory: 4Gi
    limits.cpu: "8"
    limits.memory: 8Gi
    persistentvolumeclaims: "5"
    requests.storage: 10Gi
---
apiVersion: v1
kind: LimitRange
metadata:
  name: shopsphere-default-limits
  namespace: {{ .Values.namespace }}
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
