apiVersion: v1
kind: ConfigMap
metadata:
  name: shopsphere-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "shopsphere.labels" . | nindent 4 }}
    app.kubernetes.io/name: shopsphere
    app.kubernetes.io/component: configuration
data:
  APP_ENV: {{ .Values.config.appEnv | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  ORDERS_SERVICE_URL: "http://orders-api:8080/orders"
  PAYMENTS_SERVICE_URL: "http://payments-api:8080/payments"
  POSTGRES_HOST: "postgres"
  POSTGRES_DB: {{ .Values.secret.postgresDb | quote }}
  index.html: |
    <html>
      <head><title>ShopSphere</title></head>
      <body>
        <h1>ShopSphere Storefront</h1>
        <p>Production-like Kubernetes capstone project installed by Helm.</p>
        <ul>
          <li><a href="/orders">Orders API</a></li>
          <li><a href="/payments">Payments API</a></li>
        </ul>
      </body>
    </html>
