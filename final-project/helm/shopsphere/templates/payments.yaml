apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-api
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: payments-api
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.replicaCount.payments }}
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: payments-api
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: payments-api
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: app-runner
      automountServiceAccountToken: false
      initContainers:
        - name: wait-for-postgres
          image: {{ .Values.images.app | quote }}
          command: ["/bin/sh", "-c"]
          args: ["until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done"]
      containers:
        - name: payments-api
          image: {{ .Values.images.app | quote }}
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              mkdir -p /www
              echo "ok" > /www/healthz
              echo "ready" > /www/ready
              echo "{\"service\":\"payments\",\"status\":\"running\",\"database\":\"${POSTGRES_HOST}\",\"environment\":\"${APP_ENV}\"}" > /www/payments
              httpd -f -p 8080 -h /www
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: shopsphere-config
            - secretRef:
                name: shopsphere-db-secret
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.apiResources | nindent 12 }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: web-root
              mountPath: /www
      volumes:
        - name: web-root
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: payments-api
  namespace: {{ .Values.namespace }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: payments-api
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 8080
      targetPort: http
