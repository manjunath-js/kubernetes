apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-api
  namespace: shopsphere
  labels:
    app.kubernetes.io/name: orders-api
    app.kubernetes.io/part-of: shopsphere
    app.kubernetes.io/component: api
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: orders-api
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orders-api
        app.kubernetes.io/part-of: shopsphere
        app.kubernetes.io/component: api
        app.kubernetes.io/version: v1
    spec:
      serviceAccountName: app-runner
      automountServiceAccountToken: false
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done
      containers:
        - name: orders-api
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              mkdir -p /www
              echo "ok" > /www/healthz
              echo "ready" > /www/ready
              echo "{\"service\":\"orders\",\"status\":\"running\",\"database\":\"${POSTGRES_HOST}\",\"environment\":\"${APP_ENV}\"}" > /www/orders
              httpd -f -p 8080 -h /www
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: shopsphere-config
            - secretRef:
                name: shopsphere-db-secret
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: web-root
              mountPath: /www
      volumes:
        - name: web-root
          emptyDir: {}
