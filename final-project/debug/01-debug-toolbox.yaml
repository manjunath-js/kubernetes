apiVersion: v1
kind: Pod
metadata:
  name: debug-toolbox
  namespace: shopsphere
  labels:
    app.kubernetes.io/name: debug-toolbox
    app.kubernetes.io/part-of: shopsphere
    app.kubernetes.io/component: debug
spec:
  serviceAccountName: support-reader
  restartPolicy: Never
  containers:
    - name: toolbox
      image: busybox:1.36
      command: ["sleep", "3600"]
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop: ["ALL"]
        seccompProfile:
          type: RuntimeDefault
