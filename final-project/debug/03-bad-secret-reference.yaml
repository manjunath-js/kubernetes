apiVersion: v1
kind: Pod
metadata:
  name: missing-secret-api
  namespace: shopsphere
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["sleep", "3600"]
      env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: missing-production-secret
              key: POSTGRES_PASSWORD
