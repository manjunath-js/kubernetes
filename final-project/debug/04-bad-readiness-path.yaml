apiVersion: apps/v1
kind: Deployment
metadata:
  name: bad-readiness-api
  namespace: shopsphere
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bad-readiness-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bad-readiness-api
        app.kubernetes.io/component: debug
    spec:
      containers:
        - name: app
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - mkdir -p /www; echo ok > /www/healthz; httpd -f -p 8080 -h /www
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /wrong-ready-path
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
