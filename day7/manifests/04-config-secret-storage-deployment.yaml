apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-storage-demo
  namespace: day7
  labels:
    app: config-storage-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-storage-demo
  template:
    metadata:
      labels:
        app: config-storage-demo
    spec:
      containers:
        - name: app
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
          args:
            - |
              echo "Application started"
              echo "Mode: ${APP_MODE}" > /data/status.txt
              echo "Log level: ${LOG_LEVEL}" >> /data/status.txt
              echo "Message: ${WELCOME_MESSAGE}" >> /data/status.txt
              echo "Config file:" >> /data/status.txt
              cat /etc/app-config/app.properties >> /data/status.txt
              echo "Secret username: ${DB_USERNAME}" >> /data/status.txt
              echo "Persistent data written at $(date)" >> /data/status.txt
              sleep 3600
          env:
            - name: APP_MODE
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: APP_MODE
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: LOG_LEVEL
            - name: WELCOME_MESSAGE
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: WELCOME_MESSAGE
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: DB_PASSWORD
          volumeMounts:
            - name: config-volume
              mountPath: /etc/app-config
              readOnly: true
            - name: secret-volume
              mountPath: /etc/app-secret
              readOnly: true
            - name: data-volume
              mountPath: /data
      volumes:
        - name: config-volume
          configMap:
            name: app-config
        - name: secret-volume
          secret:
            secretName: app-secret
        - name: data-volume
          persistentVolumeClaim:
            claimName: app-data-pvc
