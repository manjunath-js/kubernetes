apiVersion: v1
kind: Pod
metadata:
  name: emptydir-demo
  namespace: day7
  labels:
    app: emptydir-demo
spec:
  containers:
    - name: writer
      image: busybox:1.36
      command:
        - /bin/sh
        - -c
      args:
        - |
          while true; do date >> /cache/time.log; sleep 10; done
      volumeMounts:
        - name: cache-volume
          mountPath: /cache
    - name: reader
      image: busybox:1.36
      command:
        - /bin/sh
        - -c
      args:
        - |
          while true; do cat /cache/time.log 2>/dev/null || true; sleep 10; done
      volumeMounts:
        - name: cache-volume
          mountPath: /cache
  volumes:
    - name: cache-volume
      emptyDir: {}
