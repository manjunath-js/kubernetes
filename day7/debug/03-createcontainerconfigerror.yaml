apiVersion: v1
kind: Pod
metadata:
  name: missing-secret-demo
  namespace: day7
spec:
  containers:
    - name: app
      image: busybox:1.36
      command:
        - sleep
        - "3600"
      env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: missing-secret
              key: DB_PASSWORD
