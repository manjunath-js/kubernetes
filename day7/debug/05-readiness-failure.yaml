apiVersion: apps/v1
kind: Deployment
metadata:
  name: readiness-failure-demo
  namespace: day7
spec:
  replicas: 1
  selector:
    matchLabels:
      app: readiness-failure-demo
  template:
    metadata:
      labels:
        app: readiness-failure-demo
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /not-ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
