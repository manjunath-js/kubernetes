apiVersion: v1
kind: Pod
metadata:
  name: missing-pvc-demo
  namespace: day7
spec:
  containers:
    - name: app
      image: busybox:1.36
      command:
        - sleep
        - "3600"
      volumeMounts:
        - name: missing-storage
          mountPath: /data
  volumes:
    - name: missing-storage
      persistentVolumeClaim:
        claimName: missing-pvc
